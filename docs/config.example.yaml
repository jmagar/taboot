# LlamaCrawl Pipeline Configuration
# Copy this file to config.yaml and adjust settings as needed
# This file contains non-secret configuration (pipeline settings, feature flags)
# Secrets belong in .env file
#
# NOTE: This file reflects major config cleanup (2025-01)
# Many unused/broken options have been removed. See CLAUDE.md for details.

# =============================================================================
# DATA SOURCES CONFIGURATION
# =============================================================================

sources:
  # Firecrawl Web Scraping
  firecrawl:
    enabled: true
    # Default crawl depth for full site crawls
    default_crawl_depth: 3
    # Maximum pages per crawl (hard limit)
    max_pages: 1000
    # Output formats (markdown recommended for better parsing)
    formats: [markdown]
    # URLs to scrape (can be added dynamically via CLI)
    urls: []
    # Optionally restrict crawl scope
    include_paths: []
    exclude_paths: []
    # Worker concurrency and retry behaviour
    concurrency: 4
    max_retries: 2
    retry_delay_ms: 1500
    timeout_ms: 12000

  # GitHub Repositories
  github:
    enabled: true
    # List of repositories to sync (format: "owner/repo")
    repositories:
      - "owner/repo1"
      - "owner/repo2"
    # Include issues in ingestion
    include_issues: true
    # Include pull requests in ingestion
    include_prs: true
    # File extensions to include (empty = all files)
    file_extensions: [".md", ".py", ".ts", ".tsx", ".js", ".jsx", ".go", ".rs"]

  # Reddit Posts and Comments
  reddit:
    enabled: true
    # List of subreddits to monitor
    subreddits:
      - "python"
      - "programming"
      - "MachineLearning"
    # Maximum posts per subreddit per sync
    # Note: Reddit API hard caps at 1000 items
    post_limit: 1000
    # Include comments (can be large volume)
    include_comments: true
    # Maximum comment depth to traverse
    max_comment_depth: 5

  # Elasticsearch Document Store
  elasticsearch:
    enabled: false
    # Index patterns to query
    indices: ["docs-*", "logs-*"]
    # Field mappings (adjust based on your index schema)
    field_mappings:
      title: "title"
      content: "content"
      timestamp: "@timestamp"
    # Query filter (optional, DSL syntax)
    query_filter: {}
    # Batch size for bulk loading
    batch_size: 200

  # Gmail Email Messages
  gmail:
    enabled: false
    # Gmail labels to sync
    labels: ["INBOX", "SENT"]
    # Include attachment metadata (not file contents)
    include_attachments_metadata: true
    # Query filters using Gmail search operators
    # Examples: "from:example@gmail.com", "has:attachment", "is:unread"
    query_filters: []

# =============================================================================
# INGESTION PIPELINE SETTINGS
# =============================================================================

ingestion:
  # Document Chunking
  # Size in tokens (not characters)
  chunk_size: 512
  # Overlap between chunks (prevents losing context at boundaries)
  chunk_overlap: 50

  # Batch Processing
  # Number of documents to process per batch
  batch_size: 32
  # Number of parallel workers for pipeline transformations (leave at 1 unless needed)
  pipeline_workers: 1
  # Embedding batch size (controls TEI request payload size)
  embedding_batch_size: 64

  # Retry Logic (exponential backoff)
  retry:
    # Maximum number of retry attempts for transient failures
    max_attempts: 5
    # Initial delay before first retry (seconds)
    initial_delay_seconds: 1
    # Maximum delay between retries (seconds)
    max_delay_seconds: 60
    # Jitter percentage (0.0-1.0) to prevent thundering herd
    jitter: 0.2

  # Deduplication Strategy
  # Note: Deduplication is always enabled using SHA-256 content hash
  deduplication:
    # Normalize whitespace before hashing
    normalize_whitespace: true
    # Normalize case (lowercase) before hashing
    normalize_case: false
    # Remove punctuation before hashing
    remove_punctuation: false

  # Dead Letter Queue
  dlq:
    # Enable DLQ for failed documents
    enabled: true
    # TTL for DLQ entries (days)
    retention_days: 7

# =============================================================================
# QUERY PIPELINE SETTINGS
# =============================================================================

query:
  # Vector Search Parameters
  # Number of candidates to retrieve from vector search
  top_k: 20

  # Reranking Parameters
  # Number of documents to return after reranking
  rerank_top_n: 5
  # Enable reranking (improves relevance but adds latency)
  enable_reranking: true

  # Graph Traversal
  # Enable Neo4j graph traversal for related documents
  enable_graph_traversal: true
  # Maximum depth for relationship traversal
  max_graph_depth: 2

  # Answer Synthesis
  # Claude model to use for answer generation
  # Options: claude-3-5-haiku-20241022 (fast/cheap), claude-3-5-sonnet-20241022 (better quality)
  synthesis_model: "claude-3-5-haiku-20241022"
  # Maximum input tokens for context (Claude supports up to 200K)
  # Note: Controls input truncation only. Claude SDK doesn't expose temperature or max output tokens.
  max_input_tokens: 4096

  # Source Attribution
  # Include source snippets in response
  include_snippets: true
  # Snippet length (characters)
  snippet_length: 200

# =============================================================================
# KNOWLEDGE GRAPH EXTRACTION
# =============================================================================

graph:
  # Enable automatic entity extraction during ingestion
  auto_extract_entities: true
  # Claude model to use for entity extraction
  extraction_model: "claude-3-5-haiku-20241022"
  # Extraction strategy: simple, implicit, schema, or combined
  extraction_strategy: "simple"
  # Confidence threshold for entity extraction (0.0-1.0)
  confidence_threshold: 0.7
  # Maximum triplets to extract per chunk
  max_triplets_per_chunk: 30
  # Include implicit relations (inferred from context)
  include_implicit_relations: true

# =============================================================================
# VECTOR STORE SETTINGS
# =============================================================================

vector_store:
  # Qdrant collection name
  collection_name: "llamacrawl_documents"
  # Vector dimension (must match embedding model)
  # Qwen3-Embedding-0.6B outputs 1024-dimensional vectors
  vector_dimension: 1024
  # Distance metric: cosine, euclidean, dot
  distance_metric: "cosine"
  # Enable scalar quantization (4x memory reduction)
  enable_quantization: true
  # Upsert batching configuration
  upsert_batch_size: 256
  upsert_parallel: 2
  upsert_max_retries: 3
  # HNSW index parameters (performance tuning)
  hnsw:
    m: 16
    ef_construct: 100

# =============================================================================
# LOGGING AND METRICS
# =============================================================================

logging:
  # Format: json or text
  format: json
  # Log level (overridden by LOG_LEVEL env var)
  level: INFO
  # Include sensitive data in logs (DO NOT enable in production)
  log_sensitive_data: false

